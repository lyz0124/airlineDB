<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div>
                <h2 class="mb-1">Login</h2>
                <p class="text-muted mb-0">Air Ticket Reservation System</p>
              </div>
              <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('register_page') }}">Register</a>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-info" role="alert">
                  {% for msg in messages %}
                    <div>{{ msg }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="post" action="/login" class="row g-3">
              <div class="col-12">
                <label class="form-label">Role</label>
                <select class="form-select" name="role" required>
                  <option value="">-- Select Role --</option>
                  <option value="customer">Customer</option>
                  <option value="booking_agent">Booking Agent</option>
                  <option value="airline_staff">Airline Staff</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Email / Username</label>
                <input class="form-control" type="text" name="username" required>
              </div>
              <div class="col-12">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
              </div>
              <div class="col-12 pt-2">
                <button class="btn btn-primary w-100" type="submit">Login</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div>
                <h2 class="mb-1">Create Account</h2>
                <p class="text-muted mb-0">Air Ticket Reservation System</p>
              </div>
              <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('auth.login_page') }}">Login</a>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-info" role="alert">
                  {% for msg in messages %}
                    <div>{{ msg }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('auth.register_page') }}" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Role</label>
                <select class="form-select" id="role" name="role" required>
                  <option value="">-- Select Role --</option>
                  <option value="customer">Customer</option>
                  <option value="booking_agent">Booking Agent</option>
                  <option value="airline_staff">Airline Staff</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email / Username</label>
                <input class="form-control" type="text" name="username" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input class="form-control" type="text" name="name" required>
              </div>

              <div id="customer-fields" class="d-none">
                <hr class="my-3">
                <h5 class="mb-3">Customer Fields</h5>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Passport Number</label>
                    <input class="form-control role-customer" name="passport_number">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Passport Expiration Date</label>
                    <input class="form-control role-customer" type="date" name="passport_expiration_date">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input class="form-control role-customer" type="date" name="date_of_birth">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Building Name</label>
                    <input class="form-control" name="building_name">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Street</label>
                    <input class="form-control" name="street">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input class="form-control" name="city">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">State</label>
                    <input class="form-control" name="state">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input class="form-control" name="phone_number">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Passport Country</label>
                    <input class="form-control" name="passport_country">
                  </div>
                </div>
              </div>

              <div id="agent-fields" class="d-none">
                <hr class="my-3">
                <h5 class="mb-3">Booking Agent Fields</h5>
                <div class="col-md-6 ps-0">
                  <label class="form-label">Booking Agent ID</label>
                  <input class="form-control role-agent" name="booking_agent_id">
                </div>
              </div>

              <div id="staff-fields" class="d-none">
                <hr class="my-3">
                <h5 class="mb-3">Airline Staff Fields</h5>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Airline Name</label>
                    <input class="form-control role-staff" name="airline_name">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input class="form-control" type="date" name="staff_dob">
                  </div>
                </div>
              </div>

              <div class="col-12 pt-2">
                <button class="btn btn-primary w-100" type="submit">Register</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const role = document.getElementById("role");
    const customerFields = document.getElementById("customer-fields");
    const agentFields = document.getElementById("agent-fields");
    const staffFields = document.getElementById("staff-fields");
    const customerRequired = document.querySelectorAll(".role-customer");
    const agentRequired = document.querySelectorAll(".role-agent");
    const staffRequired = document.querySelectorAll(".role-staff");

    function setRequired(nodeList, required) {
      nodeList.forEach((el) => {
        el.required = required;
      });
    }

    function toggleRoleFields() {
      const value = role.value;
      customerFields.classList.toggle("d-none", value !== "customer");
      agentFields.classList.toggle("d-none", value !== "booking_agent");
      staffFields.classList.toggle("d-none", value !== "airline_staff");

      setRequired(customerRequired, value === "customer");
      setRequired(agentRequired, value === "booking_agent");
      setRequired(staffRequired, value === "airline_staff");
    }

    role.addEventListener("change", toggleRoleFields);
    toggleRoleFields();
  </script>
</body>
</html>
